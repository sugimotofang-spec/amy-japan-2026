<style>
  :root {
    --bg: #ffffff;

    --bg-card: #ffffff;
    --text: #1a1a18;
    --text-sec: #6b6b66;
    --text-hint: #9b9b96;
    --border: rgba(0,0,0,0.10);
    --border-med: rgba(0,0,0,0.18);
    --blue-bg: #e6f1fb; --blue-text: #0c447c; --blue-mid: #378add;
    --green-bg: #e1f5ee; --green-text: #085041; --green-mid: #1d9e75;
    --amber-bg: #faeeda; --amber-text: #633806; --amber-mid: #ba7517;
    --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141413; --bg-sec: #1e1e1c; --bg-card: #252523;
      --text: #f0efea; --text-sec: #a0a09a; --text-hint: #6b6b66;
      --border: rgba(255,255,255,0.10); --border-med: rgba(255,255,255,0.18);
      --blue-bg: #0c447c; --blue-text: #b5d4f4;
      --green-bg: #085041; --green-text: #9fe1cb;
      --amber-bg: #633806; --amber-text: #fac775;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 15px; }
  body { font-family: var(--font); background: var(--bg-sec); color: var(--text); min-height: 100vh; }

  /* Header */
  .app-header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 16px; position: sticky; top: 0; z-index: 100; }
  .app-header-inner { max-width: 480px; margin: 0 auto; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .header-name { font-size: 11px; color: var(--text-hint); letter-spacing: .05em; }
  .header-title { font-size: 20px; font-weight: 600; color: var(--text); }
  .header-sub { font-size: 12px; color: var(--text-sec); }
  .lang-row { display: flex; gap: 6px; }
  .lang-btn { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border-med); background: transparent; color: var(--text-sec); font-size: 12px; font-weight: 500; cursor: pointer; font-family: var(--font); transition: all .15s; }
  .lang-btn.active { background: #042c53; color: #b5d4f4; border-color: transparent; }
  @media (prefers-color-scheme: dark) { .lang-btn.active { background: #185fa5; color: #e6f1fb; } }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 12px 16px; max-width: 480px; margin: 0 auto; }
  .stat { background: var(--bg-card); border-radius: var(--radius-sm); padding: 10px 12px; border: 0.5px solid var(--border); }
  .stat-label { font-size: 10px; color: var(--text-hint); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .06em; }
  .stat-val { font-size: 14px; font-weight: 600; color: var(--text); }

  /* Days */
  .days-list { padding: 0 16px 32px; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }

  /* City divider */
  .city-divider { display: flex; align-items: center; gap: 8px; margin: 4px 0 2px; }
  .city-divider-line { flex: 1; height: 0.5px; background: var(--border); }
  .city-divider-label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
  .city-osaka .city-divider-label { color: var(--blue-mid); }
  .city-kyoto .city-divider-label { color: var(--green-mid); }
  .city-tokyo .city-divider-label { color: var(--amber-mid); }

  /* Day card */
  .day-card { background: var(--bg-card); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }
  .day-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }
  .day-header:active { background: var(--bg-sec); }
  .day-badge { width: 42px; height: 42px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; font-weight: 700; line-height: 1.2; }
  .badge-osaka { background: var(--blue-bg); color: var(--blue-text); }
  .badge-kyoto { background: var(--green-bg); color: var(--green-text); }
  .badge-tokyo { background: var(--amber-bg); color: var(--amber-text); }
  .day-meta { flex: 1; min-width: 0; }
  .day-date-text { font-size: 11px; color: var(--text-hint); margin-bottom: 2px; }
  .day-label-text { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .day-city-text { font-size: 11px; color: var(--text-sec); margin-top: 2px; }
  .chevron { font-size: 18px; color: var(--text-hint); transition: transform .2s; flex-shrink: 0; }
  .day-card.open .chevron { transform: rotate(180deg); }

  /* Day body */
  .day-body { display: none; border-top: 0.5px solid var(--border); padding: 0; }
  .day-card.open .day-body { display: block; }

  /* Transport pill */
  .transport-pill { display: inline-flex; align-items: center; gap: 5px; background: var(--blue-bg); color: var(--blue-text); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 500; margin: 12px 16px 0; }
  @media (prefers-color-scheme: dark) { .transport-pill { background: #0c447c; color: #b5d4f4; } }

  /* Hotel */
  .hotel-block { display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px; border-bottom: 0.5px solid var(--border); }
  .hotel-icon { font-size: 18px; margin-top: 1px; flex-shrink: 0; }
  .hotel-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .hotel-addr { font-size: 12px; color: var(--text-sec); line-height: 1.5; }
  .hotel-phone { font-size: 12px; color: var(--blue-mid); margin-top: 2px; }

  /* Spots */
  .spots-header { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text-hint); padding: 12px 16px 6px; }
  .spot-item { padding: 10px 16px; border-top: 0.5px solid var(--border); }
  .spot-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .spot-meta { display: flex; flex-direction: column; gap: 3px; }
  .spot-meta-row { display: flex; align-items: flex-start; gap: 5px; font-size: 12px; color: var(--text-sec); line-height: 1.5; }
  .spot-meta-icon { flex-shrink: 0; margin-top: 1px; }

  /* Note box */
  .note-box { background: var(--bg-sec); border-radius: var(--radius-sm); padding: 10px 12px; margin: 12px 16px; font-size: 12px; color: var(--text-sec); line-height: 1.6; }
  .note-box b { color: var(--text); }

  /* Footer */
  .app-footer { text-align: center; padding: 20px 16px; font-size: 11px; color: var(--text-hint); }

  /* Smooth transitions */
  .day-card { transition: box-shadow .15s; }
</style>
</head>

let lang = 'en';
let openIdx = null;

function setLang(l, btn) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const lx = L[l];
  document.getElementById('h-traveler').textContent = lx.traveler;
  document.getElementById('h-dates').textContent = lx.dates;
  document.getElementById('sl-cities').textContent = lx.cities;
  document.getElementById('sl-nights').textContent = lx.nights;
  document.getElementById('sl-spots').textContent = lx.spots;
  document.getElementById('footer-text').textContent = lx.footer;
  renderDays();
}

function toggleDay(idx) {
  const card = document.getElementById('card-' + idx);
  if (card.classList.contains('open')) {
    card.classList.remove('open');
  } else {
    card.classList.add('open');
  }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderDays() {
  const lx = L[lang];
  const container = document.getElementById('days-list');
  container.innerHTML = '';

  let lastCity = null;
  DAYS.forEach((d, i) => {
    // City divider
    if (d.city !== lastCity) {
      const div = document.createElement('div');
      div.className = 'city-divider city-' + d.city.toLowerCase();
      div.innerHTML = '<div class="city-divider-line"></div><div class="city-divider-label">' + esc(d.city) + '</div><div class="city-divider-line"></div>';
      container.appendChild(div);
      lastCity = d.city;
    }

    const hotelHtml = d.hotel ? `
      <div class="hotel-block">
        <span class="hotel-icon">🛏</span>
        <div>
          <div class="hotel-name">${esc(d.hotel.name)}</div>
          <div class="hotel-addr">${esc(d.hotel.addr[lang])}</div>
          ${d.hotel.phone ? `<div class="hotel-phone">${esc(d.hotel.phone)}</div>` : ''}
        </div>
      </div>` : '';

    const transportHtml = d.transport ? `<div style="padding:0 16px"><div class="transport-pill">🚄 ${esc(d.transport[lang])}</div></div>` : '';

    const spotsHtml = d.spots.length ? `
      <div class="spots-header">${esc(lx.spotsH)}</div>
      ${d.spots.map(s => `
        <div class="spot-item">
          <div class="spot-name">${esc(s.name[lang])}</div>
          <div class="spot-meta">
            <div class="spot-meta-row"><span class="spot-meta-icon">📍</span><span>${esc(s.addr)}</span></div>
            <div class="spot-meta-row"><span class="spot-meta-icon">🕐</span><span>${esc(s.hours[lang])}</span></div>
          </div>
        </div>`).join('')}` : '';

    const card = document.createElement('div');
    card.className = 'day-card';
    card.id = 'card-' + i;
    card.innerHTML = `
      <div class="day-header" onclick="toggleDay(${i})">
        <div class="day-badge ${esc(d.badgeClass)}">${esc(lx.dayN[i])}</div>
        <div class="day-meta">
          <div class="day-date-text">${esc(d.date[lang])}</div>
          <div class="day-label-text">${esc(d.label[lang])}</div>
          <div class="day-city-text">${esc(d.city)}</div>
        </div>
        <span class="chevron">⌄</span>
      </div>
      <div class="day-body">
        ${transportHtml}
        ${hotelHtml}
        ${spotsHtml}
        ${d.spots.length === 0 && !d.hotel ? '<div class="note-box">✈ ' + esc(d.transport ? d.transport[lang] : '') + '</div>' : ''}
      </div>`;
    container.appendChild(card);
  });
}

renderDays();
</script>

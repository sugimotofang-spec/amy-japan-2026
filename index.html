body{font-family:var(--font);background:var(--bg-sec);color:var(--text);min-height:100vh}
.app-header{background:var(--bg);border-bottom:.5px solid var(--border);padding:16px;position:sticky;top:0;z-index:100}
.app-header-inner{max-width:480px;margin:0 auto}
.header-title{font-size:20px;font-weight:700;margin-bottom:2px}
.header-sub{font-size:12px;color:var(--text-sec);margin-bottom:12px}
.lang-row{display:flex;gap:6px}
.lang-btn{padding:6px 14px;border-radius:20px;border:.5px solid var(--border-med);background:transparent;color:var(--text-sec);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font)}
.lang-btn.active{background:#042c53;color:#b5d4f4;border-color:transparent}

.stat{background:var(--bg-card);border-radius:var(--radius-sm);padding:10px 12px;border:.5px solid var(--border)}
.stat-label{font-size:10px;color:var(--text-hint);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.stat-val{font-size:14px;font-weight:700}
.main{padding:0 16px 40px;max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:10px}

.city-div{display:flex;align-items:center;gap:8px;margin:6px 0 2px}
.city-div-line{flex:1;height:.5px;background:var(--border)}
.city-div-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.city-osaka .city-div-label{color:var(--blue-mid)}
.city-kyoto .city-div-label{color:var(--green-mid)}
.city-tokyo .city-div-label{color:var(--amber-mid)}

.food-card{background:var(--bg-card);border-radius:var(--radius-lg);border:.5px solid var(--border);overflow:hidden}
.food-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--coral-bg);cursor:pointer}

.food-header-text{font-size:14px;font-weight:600;color:var(--coral-text)}
.food-header-sub{font-size:11px;color:var(--coral-text);opacity:.8;margin-top:1px}
.food-body{display:none;border-top:.5px solid var(--border)}
.food-card.open .food-body{display:block}
.food-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:.5px solid var(--border)}
.food-item:last-child{border-bottom:none}
.food-stars{font-size:13px;flex-shrink:0;margin-top:1px}
.food-info{}
.food-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.food-meta{font-size:11px;color:var(--text-sec);line-height:1.5}
.food-link{display:inline-block;margin-top:5px;font-size:11px;color:var(--blue-mid);text-decoration:none;border:.5px solid var(--blue-mid);border-radius:10px;padding:2px 8px}
.food-tabelog{display:block;padding:10px 16px;font-size:12px;color:var(--blue-mid);text-align:center;border-top:.5px solid var(--border);text-decoration:none}
/* Day card */
.day-card{background:var(--bg-card);border-radius:var(--radius-lg);border:.5px solid var(--border);overflow:hidden}
.day-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.day-header:active{background:var(--bg-sec)}
.day-badge{width:42px;height:42px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;line-height:1.2}
.badge-osaka{background:var(--blue-bg);color:var(--blue-text)}
.badge-kyoto{background:var(--green-bg);color:var(--green-text)}
.badge-tokyo{background:var(--amber-bg);color:var(--amber-text)}
.day-meta{flex:1;min-width:0}
.day-date-text{font-size:11px;color:var(--text-hint);margin-bottom:2px}
.day-label-text{font-size:15px;font-weight:600;line-height:1.3}
.day-city-text{font-size:11px;color:var(--text-sec);margin-top:2px}
.chevron{font-size:18px;color:var(--text-hint);transition:transform .2s;flex-shrink:0}
.day-card.open .chevron{transform:rotate(180deg)}
.day-body{display:none;border-top:.5px solid var(--border)}
.day-card.open .day-body{display:block}
.transport-pill{display:inline-flex;align-items:center;gap:5px;background:var(--blue-bg);color:var(--blue-text);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;margin:12px 16px 0}
.hotel-block{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:.5px solid var(--border)}
.hotel-name{font-size:13px;font-weight:600;margin-bottom:3px}
.hotel-addr{font-size:12px;color:var(--text-sec);line-height:1.5}
.hotel-phone{font-size:12px;color:var(--blue-mid);margin-top:2px}
.spots-header{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-hint);padding:12px 16px 6px}
.spot-item{padding:10px 16px;border-top:.5px solid var(--border)}
.spot-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.spot-name{font-size:14px;font-weight:600;flex:1}
.spot-rating{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0}
.stars{font-size:12px;line-height:1}
.rating-label{font-size:9px;color:var(--text-hint);margin-top:2px;text-align:right}
.spot-meta-row{display:flex;align-items:flex-start;gap:5px;font-size:12px;color:var(--text-sec);line-height:1.5;margin-bottom:2px}
.note-box{background:var(--bg-sec);border-radius:var(--radius-sm);padding:10px 12px;margin:12px 16px;font-size:12px;color:var(--text-sec);line-height:1.6}
.app-footer{text-align:center;padding:20px 16px;font-size:11px;color:var(--text-hint)}
</style>

let lang='en';
function setLang(l,btn){lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const lx=L[l];document.getElementById('h-dates').textContent=lx.dates;document.getElementById('sl-cities').textContent=lx.cities;document.getElementById('sl-nights').textContent=lx.nights;document.getElementById('sl-spots').textContent=lx.spots;document.getElementById('footer-text').textContent=lx.footer;render();}
function toggleCard(id){const el=document.getElementById(id);if(el)el.classList.toggle('open');}
function starsHTML(n){return'★'.repeat(n)+'☆'.repeat(5-n);}
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

function render(){
  const lx=L[lang];
  const container=document.getElementById('main');
  container.innerHTML='';
  let lastCity=null;

  DAYS.forEach((d,i)=>{
    // City divider + food card (once per city)
    if(d.city!==lastCity){
      const divEl=document.createElement('div');
      divEl.className='city-div city-'+d.city.toLowerCase();
      divEl.innerHTML='<div class="city-div-line"></div><div class="city-div-label">'+esc(d.city)+'</div><div class="city-div-line"></div>';
      container.appendChild(divEl);

      // Food card
      const fd=FOOD[d.city];
      if(fd){
        const fc=document.createElement('div');
        fc.className='food-card';
        fc.id='food-'+d.city;
        const items=fd.items.map(item=>`
          <div class="food-item">
            <div class="food-stars">${starsHTML(item.stars)}</div>
            <div class="food-info">
              <div class="food-name">${esc(item.name[lang])}</div>
              <div class="food-meta">${esc(item.type[lang])} · ${esc(item.price)}</div>
              <a class="food-link" href="${esc(item.maps)}" target="_blank">Google Maps →</a>
            </div>
          </div>`).join('');
        fc.innerHTML=`
          <div class="food-header" onclick="toggleCard('food-${d.city}')">
            <span class="food-header-icon">🍜</span>
            <div><div class="food-header-text">${esc(lx.foodTitle)}</div><div class="food-header-sub">${esc(lx.foodSub)}</div></div>
            <span style="margin-left:auto;font-size:16px;color:var(--coral-text)">⌄</span>
          </div>
          <div class="food-body">${items}<a class="food-tabelog" href="${esc(fd.tabelog)}" target="_blank">${esc(lx.tabelogLink)}</a></div>`;
        container.appendChild(fc);
      }
      lastCity=d.city;
    }

    // Day card
    const card=document.createElement('div');
    card.className='day-card';
    card.id='day-'+i;

    const transportHtml=d.transport?`<div style="padding:0 16px"><div class="transport-pill">🚄 ${esc(d.transport[lang])}</div></div>`:'';
    const hotelHtml=d.hotel?`<div class="hotel-block"><span style="font-size:18px;flex-shrink:0">🛏</span><div><div class="hotel-name">${esc(d.hotel.name)}</div><div class="hotel-addr">${esc(d.hotel.addr[lang])}</div>${d.hotel.phone?`<div class="hotel-phone">${esc(d.hotel.phone)}</div>`:''}</div></div>`:'';

    const spotsHtml=d.spots.length?`
      <div class="spots-header">${esc(lx.spotsH)}</div>
      ${d.spots.map(s=>`
        <div class="spot-item">
          <div class="spot-top">
            <div class="spot-name">${esc(s.name[lang])}</div>
            <div class="spot-rating"><div class="stars" style="color:#f59e0b">${starsHTML(s.rating)}</div><div class="rating-label">${esc(lx.ratingLabel)}</div></div>
          </div>
          <div class="spot-meta-row"><span>📍</span><span>${esc(s.addr)}</span></div>
          <div class="spot-meta-row"><span>🕐</span><span>${esc(s.hours[lang])}</span></div>
          <div class="spot-meta-row" style="margin-top:3px"><span>💬</span><span style="font-style:italic">${esc(s.reason[lang])}</span></div>
        </div>`).join('')}`:'';

    card.innerHTML=`
      <div class="day-header" onclick="toggleCard('day-${i}')">
        <div class="day-badge ${esc(d.badgeClass)}">${esc(lx.dayN[i])}</div>
        <div class="day-meta">
          <div class="day-date-text">${esc(d.date[lang])}</div>
          <div class="day-label-text">${esc(d.label[lang])}</div>
          <div class="day-city-text">${esc(d.city)}</div>
        </div>
        <span class="chevron">⌄</span>
      </div>
      <div class="day-body">
        ${transportHtml}${hotelHtml}${spotsHtml}
        ${d.spots.length===0?`<div class="note-box">✈ ${esc(d.transport?d.transport[lang]:'')} </div>`:''}
      </div>`;
    container.appendChild(card);
  });
}
render();
